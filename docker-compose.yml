version: '3.8'

services:
  geo_sales_db:
    image: postgis/postgis:16-3.4   # PostgreSQL 16 + PostGIS 3.4
    container_name: geo_sales_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: geo_sales        # Nama database
      POSTGRES_USER: postgres       # Username
      POSTGRES_PASSWORD: roni123   # Password (ganti dengan yang aman)
    ports:
      - "5432:5432"                 # Port default PostgreSQL
    volumes:
      - geo_sales_data:/var/lib/postgresql/data  # Data persisten
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Inisialisasi otomatis (opsional)

volumes:
  geo_sales_data:
